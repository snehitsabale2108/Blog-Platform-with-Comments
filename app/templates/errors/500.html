{% extends "base.html" %}
{% block title %}500 – Server Error{% endblock %}
{% block content %}
<div class="container text-center py-5 my-5">
  <div data-aos="fade-up">
    <div style="font-size: 7rem; line-height:1;">⚠️</div>
    <h1 class="display-4 fw-bold mt-3">Something went wrong</h1>
    <p class="lead text-muted mt-2 mb-4">An unexpected error occurred. Please try again later.</p>
    <a href="{{ url_for('main.index') }}" class="btn btn-primary btn-lg rounded-pill px-5">Go Home</a>
  </div>
</div>
{% endblock %}
