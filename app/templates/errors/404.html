{% extends "base.html" %}
{% block title %}404 – Not Found{% endblock %}
{% block content %}
<div class="container text-center py-5 my-5">
  <div data-aos="fade-up">
    <div style="font-size: 7rem; line-height:1;">🔍</div>
    <h1 class="display-4 fw-bold mt-3">Page not found</h1>
    <p class="lead text-muted mt-2 mb-4">The page you're looking for doesn't exist or has been moved.</p>
    <a href="{{ url_for('main.index') }}" class="btn btn-primary btn-lg rounded-pill px-5">Go Home</a>
  </div>
</div>
{% endblock %}
