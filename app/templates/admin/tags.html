{% extends "base.html" %}
{% block title %}Tags – Admin{% endblock %}
{% block extra_css %}<link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">{% endblock %}
{% block content %}
<div class="admin-layout">
  {% include 'admin/partials/sidebar.html' %}
  <div class="admin-main">
    <div class="admin-topbar"><h4 class="admin-page-title">Tags</h4></div>
    <div class="admin-card">
      <div class="admin-card-body">
        <form method="POST" class="mb-3">
          <div class="input-group input-group-sm" style="max-width:300px">
            <input type="text" name="name" class="form-control" placeholder="Tag name" required>
            <button class="btn btn-primary">Add</button>
          </div>
        </form>
        <div class="d-flex flex-wrap gap-2">
          {% for tag in tags %}
          <div class="d-flex align-items-center gap-1 badge bg-light text-dark border px-2 py-1">
            <span>#{{ tag.name }}</span>
            <span class="text-muted">({{ tag.post_count }})</span>
            <form method="POST" action="{{ url_for('admin.delete_tag', tag_id=tag.id) }}" style="display:inline" onsubmit="return confirm('Delete tag?')">
              <button type="submit" class="btn p-0 border-0 bg-transparent text-danger ms-1" style="font-size:.8rem">×</button>
            </form>
          </div>
          {% endfor %}
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
