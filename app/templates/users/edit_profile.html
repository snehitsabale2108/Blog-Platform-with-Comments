{% extends "base.html" %}
{% block title %}Edit Profile{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-7">
      <div class="settings-card" data-aos="fade-up">
        <h4 class="settings-title"><i class="bi bi-person-gear me-2"></i>Edit Profile</h4>
        <form method="POST" action="{{ url_for('users.edit_profile') }}" enctype="multipart/form-data">

          <!-- Avatar -->
          <div class="avatar-upload-section mb-4">
            <div class="avatar-preview-wrap">
              <img src="{{ url_for('static', filename=current_user.avatar_url) }}" id="avatarPreview"
                   alt="{{ current_user.username }}" class="avatar-upload-preview rounded-circle"
                   onerror="this.src='/static/images/default_avatar.png'">
              <label for="avatar" class="avatar-upload-btn">
                <i class="bi bi-camera-fill"></i>
              </label>
            </div>
            <input type="file" name="avatar" id="avatar" accept="image/*" class="d-none">
            <p class="text-muted small mt-2">JPG, PNG or GIF. Max 5MB.</p>
          </div>

          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Display Name</label>
              <input type="text" name="display_name" class="form-control" value="{{ current_user.display_name or '' }}" maxlength="100">
            </div>
            <div class="col-md-6">
              <label class="form-label">Username (read-only)</label>
              <input type="text" class="form-control" value="@{{ current_user.username }}" disabled>
            </div>
            <div class="col-12">
              <label class="form-label">Bio</label>
              <textarea name="bio" class="form-control" rows="3" maxlength="500" placeholder="Tell readers about yourself…">{{ current_user.bio or '' }}</textarea>
            </div>
            <div class="col-12">
              <label class="form-label"><i class="bi bi-globe2 me-1"></i>Website</label>
              <input type="url" name="website" class="form-control" value="{{ current_user.website or '' }}" placeholder="https://yoursite.com">
            </div>
            <div class="col-md-4">
              <label class="form-label"><i class="bi bi-twitter-x me-1"></i>Twitter</label>
              <div class="input-group">
                <span class="input-group-text">@</span>
                <input type="text" name="twitter" class="form-control" value="{{ current_user.twitter or '' }}" placeholder="handle">
              </div>
            </div>
            <div class="col-md-4">
              <label class="form-label"><i class="bi bi-github me-1"></i>GitHub</label>
              <input type="text" name="github" class="form-control" value="{{ current_user.github or '' }}" placeholder="username">
            </div>
            <div class="col-md-4">
              <label class="form-label"><i class="bi bi-linkedin me-1"></i>LinkedIn</label>
              <input type="text" name="linkedin" class="form-control" value="{{ current_user.linkedin or '' }}" placeholder="username">
            </div>
          </div>
          <div class="d-flex gap-2 justify-content-end mt-4">
            <a href="{{ url_for('users.profile', username=current_user.username) }}" class="btn btn-outline-secondary rounded-pill">Cancel</a>
            <button type="submit" class="btn btn-primary rounded-pill px-4">Save Changes</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
document.getElementById('avatar').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = ev => document.getElementById('avatarPreview').src = ev.target.result;
    reader.readAsDataURL(file);
  }
});
</script>
{% endblock %}
