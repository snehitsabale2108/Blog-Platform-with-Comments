{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card" data-aos="fade-up">
    <div class="auth-brand"><i class="bi bi-pen-fill me-2"></i>Inkwell</div>
    <h2 class="auth-title">Reset Password</h2>
    <p class="auth-subtitle text-muted">Enter your email and we'll send a reset link.</p>
    <form method="POST" class="auth-form">
      <div class="mb-4">
        <label for="email" class="form-label">Email Address</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope text-muted"></i></span>
          <input type="email" name="email" id="email" class="form-control" placeholder="you@example.com" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 rounded-pill">Send Reset Link</button>
    </form>
    <p class="text-center text-muted small mt-4">
      <a href="{{ url_for('auth.login') }}" class="auth-link"><i class="bi bi-arrow-left me-1"></i>Back to Sign In</a>
    </p>
  </div>
</div>
{% endblock %}
