{% extends "base.html" %}
{% block title %}Sign In{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card" data-aos="fade-up">
    <div class="auth-brand">
      <i class="bi bi-pen-fill me-2"></i>Inkwell
    </div>
    <h2 class="auth-title">Welcome back</h2>
    <p class="auth-subtitle text-muted">Sign in to your account to continue</p>

    <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form" novalidate>
      <div class="mb-3">
        <label for="identifier" class="form-label">Email or Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person text-muted"></i></span>
          <input type="text" name="identifier" id="identifier" class="form-control"
                 placeholder="you@example.com" required autocomplete="username">
        </div>
      </div>
      <div class="mb-3">
        <div class="d-flex justify-content-between align-items-center mb-1">
          <label for="password" class="form-label mb-0">Password</label>
          <a href="{{ url_for('auth.forgot_password') }}" class="auth-link small">Forgot password?</a>
        </div>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock text-muted"></i></span>
          <input type="password" name="password" id="password" class="form-control"
                 placeholder="••••••••" required autocomplete="current-password">
          <button class="btn btn-outline-secondary" type="button" id="togglePassword">
            <i class="bi bi-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>
      <div class="mb-4 d-flex align-items-center">
        <input type="checkbox" name="remember" id="remember" class="form-check-input me-2">
        <label for="remember" class="form-check-label text-muted small">Keep me signed in for 30 days</label>
      </div>
      <button type="submit" class="btn btn-primary w-100 btn-auth-submit rounded-pill">
        Sign In <i class="bi bi-arrow-right ms-1"></i>
      </button>
    </form>

    <hr class="auth-divider">
    <p class="text-center text-muted small mt-3">
      Don't have an account? <a href="{{ url_for('auth.register') }}" class="auth-link fw-medium">Create one free</a>
    </p>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('togglePassword').addEventListener('click', function() {
  const pw = document.getElementById('password');
  const icon = document.getElementById('eyeIcon');
  if (pw.type === 'password') { pw.type = 'text'; icon.className = 'bi bi-eye-slash'; }
  else { pw.type = 'password'; icon.className = 'bi bi-eye'; }
});
</script>
{% endblock %}
