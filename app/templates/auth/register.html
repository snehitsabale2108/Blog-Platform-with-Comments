{% extends "base.html" %}
{% block title %}Create Account{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card auth-card-wide" data-aos="fade-up">
    <div class="auth-brand">
      <i class="bi bi-pen-fill me-2"></i>Inkwell
    </div>
    <h2 class="auth-title">Join Inkwell</h2>
    <p class="auth-subtitle text-muted">Create your account and start writing today</p>

    <form method="POST" action="{{ url_for('auth.register') }}" class="auth-form" novalidate>
      <div class="row g-3">
        <div class="col-md-6">
          <label for="display_name" class="form-label">Display Name</label>
          <input type="text" name="display_name" id="display_name" class="form-control"
                 placeholder="Your Name" maxlength="100">
        </div>
        <div class="col-md-6">
          <label for="username" class="form-label">Username <span class="text-danger">*</span></label>
          <div class="input-group">
            <span class="input-group-text text-muted">@</span>
            <input type="text" name="username" id="username" class="form-control"
                   placeholder="yourusername" required minlength="3" maxlength="64" autocomplete="username">
          </div>
        </div>
        <div class="col-12">
          <label for="email" class="form-label">Email <span class="text-danger">*</span></label>
          <input type="email" name="email" id="email" class="form-control"
                 placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="col-12">
          <label for="password" class="form-label">Password <span class="text-danger">*</span></label>
          <div class="input-group">
            <input type="password" name="password" id="password" class="form-control"
                   placeholder="Min 8 characters" required minlength="8" autocomplete="new-password">
            <button class="btn btn-outline-secondary" type="button" id="togglePassword">
              <i class="bi bi-eye" id="eyeIcon"></i>
            </button>
          </div>
          <div class="password-strength mt-2">
            <div class="strength-bar"><div id="strengthFill"></div></div>
            <small id="strengthText" class="text-muted">Enter a password</small>
          </div>
        </div>
      </div>

      <div class="mt-3 mb-4">
        <div class="d-flex align-items-start gap-2">
          <input type="checkbox" id="terms" class="form-check-input mt-1" required>
          <label for="terms" class="form-check-label text-muted small">
            I agree to the <a href="#" class="auth-link">Terms of Service</a> and <a href="#" class="auth-link">Privacy Policy</a>
          </label>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 btn-auth-submit rounded-pill">
        Create Account <i class="bi bi-arrow-right ms-1"></i>
      </button>
    </form>

    <hr class="auth-divider">
    <p class="text-center text-muted small mt-3">
      Already have an account? <a href="{{ url_for('auth.login') }}" class="auth-link fw-medium">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
// Password visibility toggle
document.getElementById('togglePassword').addEventListener('click', function() {
  const pw = document.getElementById('password');
  const icon = document.getElementById('eyeIcon');
  if (pw.type === 'password') { pw.type = 'text'; icon.className = 'bi bi-eye-slash'; }
  else { pw.type = 'password'; icon.className = 'bi bi-eye'; }
});
// Password strength
document.getElementById('password').addEventListener('input', function() {
  const val = this.value;
  const fill = document.getElementById('strengthFill');
  const text = document.getElementById('strengthText');
  let score = 0;
  if (val.length >= 8) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  const labels = ['', 'Weak', 'Fair', 'Good', 'Strong'];
  const colors = ['', '#ef4444', '#f97316', '#eab308', '#22c55e'];
  fill.style.width = (score * 25) + '%';
  fill.style.background = colors[score] || '#e5e7eb';
  text.textContent = labels[score] || 'Enter a password';
  text.style.color = colors[score] || '#6b7280';
});
</script>
{% endblock %}
