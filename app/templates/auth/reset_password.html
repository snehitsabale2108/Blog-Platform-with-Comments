{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card" data-aos="fade-up">
    <div class="auth-brand"><i class="bi bi-pen-fill me-2"></i>Inkwell</div>
    <h2 class="auth-title">New Password</h2>
    <p class="auth-subtitle text-muted">Choose a strong password for your account.</p>
    <form method="POST" class="auth-form">
      <div class="mb-4">
        <label for="password" class="form-label">New Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock text-muted"></i></span>
          <input type="password" name="password" id="password" class="form-control" placeholder="Min 8 characters" required minlength="8">
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 rounded-pill">Update Password</button>
    </form>
  </div>
</div>
{% endblock %}
